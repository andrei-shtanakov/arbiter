name: CI

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, beta]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.toolchain }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.toolchain }}

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-targets

  python:
    name: Python (orchestrator + scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: ruff format --check
        run: uv run ruff format --check .

      - name: ruff check
        run: uv run ruff check .

      - name: pyrefly check
        run: uv run pyrefly check

      - name: pytest (orchestrator)
        run: uv run python -m pytest orchestrator/tests/ -v

      - name: pytest (workspace)
        run: uv run python -m pytest tests/ -v

      # RD-006 M3: the vendored authority allowlist must conform to the
      # vendored agents-catalog and match the pinned SHA (steward
      # profiles/authority.yaml is the SSOT; re-vendoring updates the pin).
      - name: Authority vendoring gate (RD-006 M3)
        env:
          AUTHORITY_PINNED_SHA: 92742a5ecb0a956307d790af582cc33e1975aee5a461914d304b3883bc7b3fc3
        run: |
          uv run python scripts/check_authority_conformance.py \
            --authority config/authority.toml \
            --catalog config/agents-catalog.toml
          echo "${AUTHORITY_PINNED_SHA}  config/authority.toml" | sha256sum -c -

  routable-gate:
    name: Routable-flip gate (ADR-ECO-003a D4)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract base catalog
        run: git show "${{ github.event.pull_request.base.sha }}:config/agents-catalog.toml" > /tmp/base-catalog.toml

      - name: Run gate
        run: python scripts/check_routable_gate.py gate --base-file /tmp/base-catalog.toml --head-file config/agents-catalog.toml

  release-binary:
    name: Build arbiter-mcp release binary (${{ matrix.target_name }})
    runs-on: ${{ matrix.runner }}
    needs: [rust, python]
    if: github.event_name == 'push'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target_name: linux-x64
          - runner: macos-latest
            target_name: macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target_name }}

      - name: Build release binary
        run: cargo build --release --bin arbiter-mcp

      - name: Stage artifact payload
        run: |
          mkdir -p dist/config dist/models
          cp target/release/arbiter-mcp dist/
          cp config/agents.toml config/invariants.toml dist/config/
          cp models/agent_policy_tree.json dist/models/
          (cd dist && tar -czf ../arbiter-mcp-${{ matrix.target_name }}.tar.gz .)

      - name: Record build metadata
        run: |
          {
            echo "commit=${GITHUB_SHA}"
            echo "ref=${GITHUB_REF}"
            echo "target=${{ matrix.target_name }}"
            echo "runner=${{ matrix.runner }}"
            echo "rustc=$(rustc --version)"
            echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > build-info.txt

      - name: Upload arbiter-mcp bundle
        uses: actions/upload-artifact@v4
        with:
          name: arbiter-mcp-${{ matrix.target_name }}
          path: |
            arbiter-mcp-${{ matrix.target_name }}.tar.gz
            build-info.txt
          retention-days: 30

      - name: Upload bundle to GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            arbiter-mcp-${{ matrix.target_name }}.tar.gz
            build-info.txt
          fail_on_unmatched_files: true
