# R-07 (sweep-2026-06-21): re-keyed onto the swept models (sonnet-4-6 / gpt-5.5),
# the only agent_ids with code-review benchmark data in benchmark_runs. Policy
# fields carried over from the prior opus/gpt-5-codex sections (model-independent);
# cost/duration are policy values, NOT raw seed (bench n=1 is unrepresentative).
["claude_code@claude-sonnet-4-6"]
